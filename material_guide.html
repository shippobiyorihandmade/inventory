// ══════════════════════════════════════════════
// フィルター定義
// ══════════════════════════════════════════════
var FILTERS = {
  fabric: [
    { id: 'easy', label: '縫いやすい' },
    { id: 'beginner', label: '初心者向け' },
    { id: 'wash_machine', label: '洗濯機OK' },
    { id: 'hand_wash', label: '手洗い推奨' },
    { id: 'bag', label: 'バッグ向き' },
    { id: 'pouch', label: 'ポーチ向き' },
    { id: 'summer', label: '夏向け' },
    { id: 'winter', label: '秋冬向け' },
    { id: 'baby', label: 'ベビー向け' },
  ],
  yarn: [
    { id: 'beginner', label: '初心者向け' },
    { id: 'wash_machine', label: '洗濯機OK' },
    { id: 'hand_wash', label: '手洗い推奨' },
    { id: 'summer', label: '春夏向け' },
    { id: 'winter', label: '秋冬向け' },
    { id: 'warm', label: '保温性高い' },
    { id: 'bag', label: 'バッグ向き' },
    { id: 'amigurumi', label: 'あみぐるみ向き' },
    { id: 'baby', label: 'ベビー向け' },
  ]
};

var currentType = 'fabric';
var activeFilters = [];

// ══════════════════════════════════════════════
// レンダリング
// ══════════════════════════════════════════════
function setType(type) {
  currentType = type;
  activeFilters = [];
  document.querySelectorAll('.ttab').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.ttab')[type === 'fabric' ? 0 : 1].classList.add('on');
  renderFilters();
  renderCards();
}

function toggleFilter(id) {
  var idx = activeFilters.indexOf(id);
  if (idx >= 0) activeFilters.splice(idx, 1);
  else activeFilters.push(id);
  renderFilters();
  renderCards();
}

function renderFilters() {
  var filters = FILTERS[currentType];
  document.getElementById('filterChips').innerHTML = filters.map(function(f) {
    var on = activeFilters.includes(f.id);
    return '<button class="fchip' + (on?' on':'') + '" onclick="toggleFilter(\'' + f.id + '\')">' + f.label + '</button>';
  }).join('');
}

function renderCards() {
  var list = MATERIALS[currentType].filter(function(m) {
    if (!activeFilters.length) return true;
    return activeFilters.every(function(f){ return m.filters.includes(f); });
  });
  var grid = document.getElementById('cardGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>該当する素材が見つかりませんでした。<br>フィルターを変えてみてください。</p></div>';
    return;
  }
  var isFabric = currentType === 'fabric';
  grid.innerHTML = list.map(function(m) {
    var stars = isFabric
      ? renderStars('縫いやすさ', m.stars.ease) + renderStars('洗濯', m.stars.wash) + renderStars('通気性', m.stars.breath) + renderStars('伸縮性', m.stars.stretch)
      : renderStars('手触り', m.stars.feel) + renderStars('洗濯', m.stars.wash) + renderStars('価格', m.stars.price);
    var tags = m.tags.map(function(t){ return '<span class="mat-tag" style="background:' + t.color + ';color:' + t.tx + '">' + t.label + '</span>'; }).join('');
    return '<div class="mat-card" onclick="showDetail(\'' + currentType + '\',\'' + m.id + '\')">'
      + '<div class="mat-card-head">'
      + '<div class="mat-icon" style="background:' + m.iconBg + '">' + m.icon + '</div>'
      + '<div><div class="mat-name">' + m.name + '</div><div class="mat-cat">' + m.cat + ' · ' + m.season + ' · ' + m.price + '</div></div>'
      + '</div>'
      + '<div class="mat-card-body">'
      + '<div class="mat-tags">' + tags + '</div>'
      + stars
      + (isFabric && m.needle ? '<div style="font-size:11px;color:var(--tx2);background:var(--sf2);border-radius:7px;padding:5px 9px;margin-bottom:6px">🪡 針：' + m.needle + '　糸：' + m.thread + '</div>' : '')
      + '<div class="mat-uses-label">向いている作品</div>'
      + '<div class="mat-uses">' + m.uses + '</div>'
      + '</div></div>';
  }).join('');
}

function renderStars(label, val) {
  var stars = '';
  for (var i = 1; i <= 5; i++) {
    stars += '<span class="star ' + (i <= val ? 'on' : 'off') + '">★</span>';
  }
  return '<div class="stars-row"><span class="stars-label">' + label + '</span><div class="stars">' + stars + '</div></div>';
}

// ══════════════════════════════════════════════
// 詳細モーダル
// ══════════════════════════════════════════════
function showDetail(type, id) {
  var m = MATERIALS[type].find(function(x){ return x.id === id; });
  if (!m) return;
  var isFabric = type === 'fabric';
  document.getElementById('modIcon').style.background = m.iconBg;
  document.getElementById('modIcon').textContent = m.icon;
  document.getElementById('modTitle').textContent = m.name;
  document.getElementById('modSub').textContent = m.cat + '  ·  ' + m.season + '  ·  ' + m.price;

  var stars = isFabric
    ? renderStars('縫いやすさ', m.stars.ease) + renderStars('洗濯強度', m.stars.wash) + renderStars('通気性', m.stars.breath) + renderStars('伸縮性', m.stars.stretch)
    : renderStars('手触り', m.stars.feel) + renderStars('洗濯強度', m.stars.wash) + renderStars('価格帯', m.stars.price);

  var tags = m.tags.map(function(t){ return '<span class="mat-tag" style="background:' + t.color + ';color:' + t.tx + ';font-size:12px;padding:4px 12px">' + t.label + '</span>'; }).join('');

  var needleHtml = (isFabric && m.needle) ? '<div class="modal-section"><div class="modal-section-title">🪡 ミシン設定の目安</div><div style="display:flex;gap:8px;flex-wrap:wrap"><div style="flex:1;min-width:140px;background:var(--sf2);border-radius:10px;padding:11px 14px"><div style="font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.06em;margin-bottom:4px">ミシン針</div><div style="font-size:14px;font-weight:700">' + m.needle + '</div></div><div style="flex:1;min-width:140px;background:var(--sf2);border-radius:10px;padding:11px 14px"><div style="font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.06em;margin-bottom:4px">ミシン糸</div><div style="font-size:14px;font-weight:700">' + m.thread + '</div></div></div><p style="font-size:11px;color:var(--tx3);margin-top:8px">※生地の厚みや重ね枚数によって調整してください。</p></div>' : '';

  var cautions = m.cautions.map(function(c){ return '<li>' + c + '</li>'; }).join('');

  document.getElementById('modBody').innerHTML =
    '<div class="modal-section"><div class="mat-tags" style="margin-bottom:12px">' + tags + '</div>' + stars + '</div>'
    + needleHtml
    + '<div class="modal-section"><div class="modal-section-title">📝 特徴・説明</div><p class="detail-text">' + m.desc + '</p></div>'
    + '<div class="modal-section"><div class="modal-section-title">📌 向いている作品</div><p class="detail-text">👉 ' + m.uses + '</p></div>'
    + '<div class="modal-section"><div class="modal-section-title">⚠️ 扱う際の注意点</div><div class="caution-box"><ul>' + cautions + '</ul></div></div>';

  document.getElementById('detailOv').classList.add('open');
}

function closeMod() {
  document.getElementById('detailOv').classList.remove('open');
}

// 初期化
renderFilters();
renderCards();
</script>
